<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bible Verse Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Daily Bible Verse Card</h1>
        <p>Choose a card to receive your daily blessing.</p>
        
        <div class="cards-wrapper" id="cards-wrapper">
            <!-- Cards will be generated here by JavaScript -->
        </div>

        <button id="refresh-btn">Draw New Cards</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
